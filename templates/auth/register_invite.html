{% extends "base.html" %}

{% block title %}Complete Registration - Hive LMS{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 500px; margin: 80px auto; padding: 40px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);">
    <div style="text-align: center; margin-bottom: 35px;">
        <h1 style="font-size: 2.2rem; color: #fff; margin-bottom: 10px;">Welcome to Hive</h1>
        <p style="color: #aaa;">You have been invited as a <strong>{{ invite.role.replace('_', ' ').title() }}</strong></p>
        <p style="color: #888; font-size: 0.9rem;">Institution: {{ invite.school.name }}</p>
    </div>

    <form method="POST" class="auth-form">
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; color: #fff; margin-bottom: 8px; font-weight: 500;">Email Address</label>
            <input type="text" value="{{ invite.email }}" disabled style="width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #888; font-size: 1rem;">
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; color: #fff; margin-bottom: 8px; font-weight: 500;">Full Name</label>
            <input type="text" name="name" required style="width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 1rem;" placeholder="Your Full Name">
        </div>

        <div class="form-group" style="margin-bottom: 30px;">
            <label style="display: block; color: #fff; margin-bottom: 8px; font-weight: 500;">Set Password</label>
            <input type="password" name="password" required style="width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 1rem;" placeholder="Choose a strong password">
        </div>

        <button type="submit" style="width: 100%; padding: 15px; background: linear-gradient(135deg, #8e44ad 0%, #c33764 100%); border: none; border-radius: 10px; color: #fff; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s;">
            Complete Registration
        </button>
    </form>
</div>
{% endblock %}
