{% extends "base.html" %}

{% block title %}Student Registration - Hive LMS{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 500px; margin: 80px auto; padding: 40px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);">
    <div style="text-align: center; margin-bottom: 35px;">
        <h1 style="font-size: 2.2rem; color: #fff; margin-bottom: 10px;">Student Registration</h1>
        <p style="color: #aaa;">Enter your university email to get started</p>
    </div>

    <form method="POST" class="auth-form">
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; color: #fff; margin-bottom: 8px; font-weight: 500;">Full Name</label>
            <input type="text" name="name" required style="width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 1rem;" placeholder="Your Full Name">
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; color: #fff; margin-bottom: 8px; font-weight: 500;">University Email</label>
            <input type="email" name="email" required style="width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 1rem;" placeholder="e.g. name@university.edu.in">
        </div>

        <div class="form-group" style="margin-bottom: 30px;">
            <label style="display: block; color: #fff; margin-bottom: 8px; font-weight: 500;">Password</label>
            <input type="password" name="password" required style="width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 1rem;" placeholder="Choose a strong password">
        </div>

        <button type="submit" style="width: 100%; padding: 15px; background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); border: none; border-radius: 10px; color: #fff; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s;">
            Register as Student
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 25px;">
        <p style="color: #888;">Already have an account? <a href="{{ url_for('auth.login') }}" style="color: #00d2ff; text-decoration: none;">Login</a></p>
    </div>
</div>
{% endblock %}
